services:
  velo-db:
    image: postgres:15
    container_name: velo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: tasktrak
    volumes:
      - velo-db-data:/var/lib/postgresql/data
    networks:
      - default

  velo-api:
    build:
      context: ./backend
    container_name: velo-api
    restart: unless-stopped
    depends_on:
      - velo-db
    env_file:
      - ./backend/.env.production
    expose:
      - "8080"
    networks:
      - shared-net
      - default

networks:
  shared-net:
    external: true

volumes:
  velo-db-data:
